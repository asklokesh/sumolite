name: release

on:
  push:
    tags: ['v*']

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: macos-14,   goos: darwin, goarch: arm64 }
          - { os: macos-13,   goos: darwin, goarch: amd64 }
          - { os: ubuntu-24.04, goos: linux,  goarch: amd64 }
          - { os: ubuntu-24.04-arm, goos: linux, goarch: arm64 }
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with: { go-version: '1.22' }
      - name: linux deps
        if: matrix.goos == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgstreamer1.0-dev
      - run: make release GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }}
      - uses: softprops/action-gh-release@v2
        with:
          files: dist/sumolite-${{ matrix.goos }}-${{ matrix.goarch }}

  docker:
    runs-on: ubuntu-24.04
    needs: build
    permissions: { contents: read, packages: write }
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - run: make docker
