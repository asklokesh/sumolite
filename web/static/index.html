<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>sumolite</title>
<style>
  :root { color-scheme: dark; }
  html, body { margin: 0; height: 100%; background: #000; color: #eee;
    font: 14px/1.4 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
  #stage { position: fixed; inset: 0; display: grid; place-items: center; }
  video { width: 100%; height: 100%; object-fit: contain; background: #000;
    cursor: none; }
  #pair { display: grid; gap: 12px; padding: 24px 32px; background: #111;
    border-radius: 12px; min-width: 280px; }
  #pair input { font: inherit; font-size: 20px; letter-spacing: 4px;
    text-align: center; padding: 8px; background: #000; color: #fff;
    border: 1px solid #333; border-radius: 6px; }
  #pair button { font: inherit; padding: 10px; background: #2a7;
    color: #000; border: 0; border-radius: 6px; font-weight: 600;
    cursor: pointer; }
  #hud { position: fixed; top: 8px; right: 8px; font: 11px/1.2 ui-monospace,
    Menlo, monospace; color: #8c8; background: rgba(0,0,0,.6); padding: 6px 8px;
    border-radius: 4px; pointer-events: none; }
  .hidden { display: none !important; }
</style>
</head>
<body>
<div id="stage">
  <form id="pair" autocomplete="off">
    <label for="code">Enter pairing code</label>
    <input id="code" maxlength="6" placeholder="abc123" autofocus required>
    <button type="submit">Connect</button>
  </form>
  <video id="v" autoplay playsinline class="hidden"></video>
</div>
<div id="hud" class="hidden"></div>
<script src="/js/client.js" type="module"></script>
</body>
</html>
